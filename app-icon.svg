    <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#bg)" />
    <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#gloss)" />

    <g transform="translate(512 512) scale(0.8) translate(-512 -512)">
      <g fill="#ffffff" stroke="#ffffff" stroke-width="22" stroke-linejoin="round">
        <path d="M257 340 L257 684 L497 512 Z" />
      </g>
      <g fill="#ffffff">
        <rect x="527" y="432" width="60" height="160" rx="30" />
        <rect x="617" y="362" width="60" height="300" rx="30" />
        <rect x="707" y="407" width="60" height="210" rx="30" />
      </g>
    </g>
  </g>
</svg>
