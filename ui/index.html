<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sonora</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header class="app-header">
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M5 5.6v12.8L14 12 5 5.6Z" fill="#fff" />
            <rect x="15.4" y="9.2" width="2" height="5.6" rx="1" fill="#fff" />
            <rect x="18.6" y="6.6" width="2" height="10.8" rx="1" fill="#fff" />
          </svg>
        </span>
        <div>
          <p class="eyebrow">YOUTUBE AUDIO DOWNLOADER</p>
          <h1>Sonora</h1>
        </div>
      </header>

      <label for="url">YouTube の URL</label>
      <input id="url" type="text" placeholder="https://www.youtube.com/watch?v=..." autofocus />

      <label for="dir">保存先</label>
      <div class="row">
        <input id="dir" type="text" />
        <button id="choose">選択…</button>
      </div>

      <div id="listwrap" hidden>
        <div class="listhead">
          <span id="count" class="muted"></span>
          <span class="listactions">
            <a id="all" href="#">全選択</a>
            <a id="none" href="#">全解除</a>
          </span>
        </div>
        <div id="list"></div>
      </div>

      <div class="optrow">
        <label class="switch">
          <input id="mp3" type="checkbox" />
          <span class="slider"></span>
          <span class="switch-text">mp3 に変換する</span>
        </label>
        <span id="ffstatus" class="muted">既定は m4a（高音質・変換なし）</span>
      </div>

      <button id="go" class="primary">ダウンロード</button>

      <div class="bar"><div id="fill"></div></div>

      <div id="donewrap" hidden>
        <label>ダウンロード済み（クリックで Finder に表示）</label>
        <div id="files"></div>
      </div>

      <label class="log-label">ログ</label>
      <pre id="log"></pre>
    </main>
    <script src="main.js"></script>
  </body>
</html>
